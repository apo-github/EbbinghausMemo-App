name: Mobile Build (Auto-Init)
on:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # 1. Node.js セットアップ
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 2. Rust セットアップ
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || 'aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim' }}

      # 3. Android用セットアップ
      - name: setup Java and Android SDK
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      # 4. 依存関係インストール
      - name: install dependencies
        run: npm install

      # 5. モバイルプロジェクトの初期化
      - name: tauri mobile init
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            printf "com.ebbinghaus.app\nEbbinghausMemo\n" | npx tauri android init
          else
            printf "com.ebbinghaus.app\nEbbinghausMemo\n" | npx tauri ios init
          fi

      # 6. Android署名鍵の準備
      - name: Decode Android Keystore
        if: matrix.platform == 'android'
        run: |
          mkdir -p src-tauri/gen/android/
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > src-tauri/gen/android/release.keystore

      # 7. ビルド実行
      - name: tauri mobile build
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            npm run tauri android build -- --release
          else
            # iOSは通常、CI上での署名にApple Developer Programの証明書が必要ですが、
            # まずは署名なし(あるいはシミュレータ用)でビルドを試みます
            npm run tauri ios build -- --release
          fi
        env:
          TAURI_ANDROID_KEYSTORE: "${{ github.workspace }}/src-tauri/gen/android/release.keystore"
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # 8. 成果物の保存 (プラットフォームごとに分ける)
      - name: Upload Android Artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: "src-tauri/gen/android/app/build/outputs/apk/release/*.apk"
          if-no-files-found: error

      - name: Upload iOS Artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: "src-tauri/gen/apple/build/Release-iphoneos/*.app"
          if-no-files-found: warn