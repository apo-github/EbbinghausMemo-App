name: Mobile Build (Auto-Init)
on:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # 1. Node.js セットアップ
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 2. Rust セットアップ
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || 'aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim' }}

      # 3. Android用セットアップ (NDKを追加)
      - name: setup Java and Android SDK
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      # Tauri V2に必須のNDKバージョン
      - name: install NDK
        if: matrix.platform == 'android'
        run: sdkmanager "ndk;26.1.10909125"

      # 5. モバイルプロジェクトの初期化 (識別子を合わせる)
      - name: tauri mobile init
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            # identifierはドット区切り、かつ小文字のみが安全
            printf "com.ebbinghaus.app\nebbinghaus\n" | npx tauri android init
          else
            printf "com.ebbinghaus.app\nebbinghaus\n" | npx tauri ios init
          fi

      # 7. ビルド実行
      - name: tauri mobile build
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            # 修正：まずは --debug で中身が詰まったAPKができるか確認
            npm run tauri android build -- --debug
          else
            npm run tauri ios build
          fi
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      # 8. 成果物の保存 (プラットフォームごとに分ける)
      - name: Upload Android Artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          # gen フォルダに頼らず、プロジェクト全体から .apk を探す設定
          path: "**/*.apk"
          if-no-files-found: error

      - name: Upload iOS Artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: "**/*.apk"
          if-no-files-found: warn