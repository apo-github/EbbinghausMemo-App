name: Mobile Build (Auto-Init)
on:
  push:
    branches: [ main ] # mainにpushした時に実行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # 1. Node.js セットアップ
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 2. Rust セットアップ
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # モバイルビルドに必要なターゲットを追加
          targets: ${{ matrix.platform == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || 'aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim' }}

      # 3. Android用JDK/SDKセットアップ (Androidのみ)
      - name: setup Java and Android SDK
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      # 4. 依存関係インストール
      - name: install dependencies
        run: npm install

      # 5. モバイルプロジェクトの初期化 (Local initの代わり)
      # ここでパッケージ名とアプリ名を指定します
      # 5. モバイルプロジェクトの初期化 (対話入力を printf でシミュレート)
      - name: tauri mobile init
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            # 1つ目の入力にパッケージ名、2つ目にアプリ名を流し込む (\n は Enter キー)
            printf "com.ebbinghaus.app\nEbbinghausMemo\n" | npx tauri android init
          else
            printf "com.ebbinghaus.app\nEbbinghausMemo\n" | npx tauri ios init
          fi

      # 6. ビルド実行
      # --no-bundle を削除し、npm の引数渡しとして -- を使用
      - name: tauri mobile build
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            npm run tauri android build --
          else
            npm run tauri ios build --
          fi

      # 7. 成果物を保存
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/apple/build/Products/Release-iphoneos/*.ipa
          if-no-files-found: error # ファイルが見つからない場合にエラーを出して場所を特定しやすくする